<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Таблица издержек</title>
    <style>
        body { font-family: sans-serif; max-width: 800px; margin: 40px auto; padding: 0 20px; color: #333; }
        a { text-decoration: none; color: #007BFF; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 12px; border: 1px solid #ddd; text-align: left; }
        th { background-color: #f2f2f2; }
        tr:hover { background: #f5f5f5; }
        .back-link { display: inline-block; margin-bottom: 20px; }
    </style>
</head>
<body>
    <a href="{% url 'index' %}" class="back-link">На главную страницу</a>
    <h2>Таблица издержек организации</h2>

    <table>
        <thead>
            <tr>
                <th>Тип издержки</th>
                <th>Сумма, руб)</th>
                <th>День учёта</th>
            </tr>
        </thead>
        <tbody>
            {% for expense in expenses %}
            <tr>
                <td>{{ expense.get_type_display }}</td>
                <td>{{ expense.amount }}</td>
                <td>{{ expense.date|date:"d.m.Y" }}</td>
            </tr>
            {% empty %}
            <tr>
                <td colspan="3" style="text-align: center;">Издержки не найдены.</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</body>
</html>
