<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Добавить издержку</title>
    <style>
        body { font-family: sans-serif; max-width: 600px; margin: 40px auto; padding: 0 20px; color: #333; }
        a { text-decoration: none; color: #007BFF; }
        form { background: #f4f4f4; padding: 20px; border-radius: 5px; margin: 20px 0; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input, select { width: 100%; padding: 8px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px; }
        .btn { padding: 10px 20px; background: #6f42c1; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; }
        .btn:hover { background: #5a32a3; }
        .back-link { display: inline-block; margin-bottom: 20px; }
        .errorlist { color: red; list-style: none; padding: 0; margin: 5px 0 0 0; font-size: 14px; }
        .js-error { color: red; display: none; margin-bottom: 15px; font-weight: bold; }
    </style>
</head>
<body>
    <a href="{% url 'index' %}" class="back-link">На главную страницу</a>
    <h2>Внести новую издержку организации</h2>

    <div id="jsError" class="js-error">Ошибка: сумма издержки - число больше 0 рублей.</div>

    <form method="POST" id="expenseForm">
        {% csrf_token %}

        {% for field in form %}
            <div class="form-group">
                <label for="{{ field.id_for_label }}">{{ field.label }}</label>
                {{ field }}
            </div>
        {% endfor %}

        <button type="submit" class="btn">Сохранить издержку</button>
    </form>

    <script>
        document.getElementById('expenseForm').addEventListener('submit', function(e) {
            const amountInput = document.querySelector('input[name="amount"]');
            const errorDiv = document.getElementById('jsError');

            if (amountInput) {
                const value = parseFloat(amountInput.value); //число в поле суммы издержки

                //сумма должна быть строго больше 0/быть числом
                if (isNaN(value) || value <= 0) {
                    e.preventDefault(); //запрещаем отправку формы
                    errorDiv.style.display = 'block';
                    amountInput.style.borderColor = 'red';
                } else {
                    errorDiv.style.display = 'none';
                    amountInput.style.borderColor = '#ccc';
                }
            }
        });
    </script>
</body>
</html>
