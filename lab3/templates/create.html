<!DOCTYPE html>
<html>
<head>
    <title>Создание данных</title>
    <style>
        table { width: 100%; border-collapse: collapse; margin-bottom: 20px; }
        th, td { border: 1px solid #ccc; padding: 8px; text-align: left; }
        .error { border: 2px solid red !important; }
    </style>
</head>
<body>
    <h2>Таблица товаров</h2>

    <table id="productTable">
        <thead>
            <tr>
                <th>Наименование товара</th>
                <th>Группа</th>
                <th>Кол-во, шт.</th>
                <th>Цена продажи, руб.</th>
                <th>Цена закупки, руб.</th>
                <th>Скидка, %</th>
                <th></th>
            </tr>
        </thead>
        <!-- Первая строка по умолчанию -->
        <tbody>
            <tr>
                <td contenteditable="true">Товар 1</td>
                <td contenteditable="true">0</td>
                <td contenteditable="true">0</td>
                <td contenteditable="true">0</td>
                <td contenteditable="true">0</td>
                <td contenteditable="true">0</td>
                <td><button onclick="deleteRow(this)">Удалить</button></td> <!-- выглядит странно, но удобно. мб сменить оформление кнопке? -->
            </tr>
        </tbody>
    </table>

    <p>
        <button onclick="addRow()">Добавить товар</button>
    </p>
    <p>
        <button onclick="saveFile()" style="background-color: #4CAF50; color: white;">Сохранить файл с данными</button>
    </p>
    <p>
        <a href= "{% url 'homepage' %}">
            <button>Вернуться на главную</button>
        </a>
    </p>

    <script>
        // Функция добавления новой строки
        function addRow() {
            let table = document.getElementById("productTable").getElementsByTagName('tbody')[0];
            let newRow = table.insertRow();

            let cell = newRow.insertCell(0);
                cell.contentEditable = "true";
                cell.innerText = "Товар"; // Значение по умолчанию
            //следующие 5 ячеек
            for (let i = 1; i < 6; i++) {
                let cell = newRow.insertCell(i);
                cell.contentEditable = "true";
                cell.innerText = "0"; // Значение по умолчанию
            }
            let actionCell = newRow.insertCell(6); // удаление
            actionCell.innerHTML = '<button onclick="deleteRow(this)">Удалить</button>';
        }

        function deleteRow(btn) {
            let row = btn.parentNode.parentNode;
            row.parentNode.removeChild(row);
        }

        function saveFile() {
            let rows = document.querySelectorAll('#productTable tbody tr');
            let data = [];
            let allValid = true;

            rows.forEach((row, index) => {
                let cells = row.cells;

                let name = cells[0].innerText.trim();
                let group = Number(cells[1].innerText);
                let qty = Number(cells[2].innerText);
                let sPrice = Number(cells[3].innerText);
                let pPrice = Number(cells[4].innerText);
                let discount = Number(cells[5].innerText);

                Array.from(cells).forEach(c => c.classList.remove('error')); //на случай, если в пред раз были ошибки

                //валидация
                let rowValid = true;
                if (!name) rowValid = false;
                if (!Number.isInteger(group) || group <= 0) { cells[1].classList.add('error'); rowValid = false; }
                if (!Number.isInteger(qty) || qty <= 0) { cells[2].classList.add('error'); rowValid = false; }
                if (isNaN(sPrice) || sPrice <= 0) { cells[3].classList.add('error'); rowValid = false; }
                if (isNaN(pPrice) || pPrice <= 0) { cells[4].classList.add('error'); rowValid = false; }
                if (isNaN(discount) || discount < 0 || discount > 100) { cells[5].classList.add('error'); rowValid = false; }

                if (!rowValid) {
                    allValid = false;
                } else {
                    data.push(JSON.stringify({
                        name: name,
                        group: group,
                        qty: qty,
                        sale: sPrice,
                        purchase: pPrice,
                        discount: discount
                    }));
                }
            });
            // сообщения об ошибке
            // 1. Пустая таблица
            if (data.length === 0) {
                alert("Таблица пуста, для сохранения заполните хотя бы одним товаром.");
                return;
            }
            // 2. Всякие неправильные значения
            if (!allValid) {
                alert("Неправильное заполнение таблицы, ошибка указана красными границами.\n" +
                    "Возможно, вы допустили одну из следующих ошибок:\n" +
                    "1) количество и группа указаны не целыми числами/числами меньше или равно 0\n" +
                    "2) указана цена равно или меньше 0\n" +
                    "3) указана скидка НЕ в диапазоне 0-100%");
                return;
            }

            // Создание и скачивание файла
            let blob = new Blob([data.join('\n')], {type: "text/plain"});
            let link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.download = "products_data.txt";
            link.click();
        }
    </script>
</body>
</html>
