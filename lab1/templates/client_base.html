<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>База клиентов</title>
</head>
<body>
    <h1>База клиентов</h1>
    <p>
        <a href= "{% url 'client_search' %}">
            <button>Hайти клиента</button>
        </a>
    </p>

    <table border="1">
        <tr>
            <th>Имя</th>
            <th>Общий счет покупок</th>
            <th>Текущий счет</th>
            <th>Потолок кредита</th>
            <th>Текущий долг</th>
            <th>Остаток кредита</th>
            <th>Комментарий</th>
        </tr>

        {% for cl in clients %}
        <tr>
          <td>{{ cl.name }}</td>
          <td>{{ cl.a_total }}</td>
          <td>{{ cl.a_current }}</td>
          <td>{{ cl.c_limit }}</td>
          <td {% if cl.credit_danger %}style="color: red;"{% endif %}>{{ cl.c_current }}</td>
          <td {% if cl.credit_danger %}style="color: red;"{% endif %}>{{ cl.credit_remain }}</td>
          <td>{{ cl.comm }}</td>
        </tr>
        {% empty %}
            <tr><td colspan="7">Клиентов нет</td></tr>
        {% endfor %}
    </table>
    <p>
        <a href= "{% url 'homepage' %}">
            <button>На главную страницу</button>
        </a>
    </p>

</body>
</html>
