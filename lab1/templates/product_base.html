<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Склад товаров</title>
</head>
<body>
    <h1>Склад товаров</h1>
    <table border="1">
        <tr>
            <th>Название</th>
            <th>Цена за 1 шт.</th>
            <th>Количество</th>
        </tr>

        {% for pr in products %}
        <tr>
          <td>{{ pr.name }}</td>
          <td>{{ pr.price }}</td>
          <td>{{ pr.stock }}</td>
        </tr>
        {% empty %}
            <tr>
                <td colspan="3">Товаров пока нет</td>
            </tr>
        {% endfor %}
    </table>

    <p>
        <a href= "{% url 'product_add' %}">
            <button>Управление складом</button>
        </a>
    </p>
    <p>
        <a href= "{% url 'homepage' %}">
            <button>На главную страницу</button>
        </a>
    </p>
</body>
</html>
